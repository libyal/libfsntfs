[project]
name: "libfsntfs"
status: "experimental"
year_of_creation: "2010"
data_format: "New Technology File System (NTFS)"
documentation_url: "https://github.com/libyal/libfsntfs/tree/main/documentation"
features: ["debug_output", "nuget", "ossfuzz", "python_bindings", "tools"]

[library]
features: ["pthread", "wide_character_type"]
public_types: ["attribute", "attribute_list_entry", "data_stream", "file_entry", "mft_metadata_file", "usn_change_journal", "volume"]
tests: ["attribute", "attribute_list_entry", "bitmap_values", "buffer_data_handle", "cluster_block", "cluster_block_data", "cluster_block_stream", "cluster_block_vector", "compressed_block", "compressed_block_data_handle", "compressed_block_vector", "compressed_data_handle", "compression", "compression_unit_data_handle", "compression_unit_descriptor", "data_run", "data_stream", "directory_entries_tree", "directory_entry", "error", "extent", "file_entry", "file_name_attribute", "file_name_values", "file_system", "fixup_values", "index", "index_entry", "index_entry_header", "index_entry_vector", "index_node", "index_node_header", "index_root_header", "index_value", "io_handle", "logged_utility_stream_values", "mft", "mft_attribute", "mft_attribute_list", "mft_attribute_list_entry", "mft_entry", "mft_entry_header", "name", "notify", "object_identifier_values", "path_hint", "profiler", "reparse_point_attribute", "reparse_point_values", "sds_index_value", "security_descriptor_index", "security_descriptor_index_value", "security_descriptor_values", "standard_information_values", "txf_data_values", "usn_change_journal", "volume_header", "volume_information_attribute", "volume_information_values", "volume_name_attribute", "volume_name_values"]
tests_with_input: ["mft_metadata_file", "support", "volume"]

[python_module]
tests: ["support"]
tests_with_input: ["attribute", "file_entry", "volume"]

[tools]
build_dependencies: ["crypto", "fuse"]
description: "Several tools for reading New Technology File System (NTFS) volumes"
names: ["fsntfsinfo", "fsntfsmount"]
tests: ["bodyfile", "digest_hash", "info_handle", "mount_path_string", "output", "path_string", "signal"]

[info_tool]
source_description: "a New Technology File System (NTFS) volume"
source_type: "volume"

[mount_tool]
features: ["offset", "symbolic_link"]
file_entry_access_time_type: "filetime"
file_entry_creation_time_type: "filetime"
file_entry_example: "config.sys"
file_entry_inode_change_time_type: "filetime"
file_entry_modification_time_type: "filetime"
file_entry_type: "file_entry"
file_system_type: "volume"
mounted_description: "a file system contained in the NTFS volume"
source: "image.raw"
source_description: "a NTFS volume"
source_description_long: "a New Technology File System (NTFS) volume"
source_type: "volume"

[test_data]
repository: "log2timeline/dfvfs"
files: ["ntfs.raw"]

[tests]
profiles: ["libfsntfs", "pyfsntfs", "fsntfsinfo", "fsntfsinfo_bodyfile_mft", "fsntfsinfo_bodyfile_fs", "fsntfsinfo_mft", "fsntfsinfo_fs", "fsntfsinfo_usn"]
option_sets: ["offset"]
options_per_profile: ["", "", "", "-Bbodyfile -Eall", "-Bbodyfile -H", "-Eall", "-H", "-U"]
info_tool_option_sets: ["offset"]
info_tool_profiles: ["fsntfsinfo", "fsntfsinfo_fs", "fsntfsinfo_mft", "fsntfsinfo_usn", "fsntfsinfo_bodyfile_fs", "fsntfsinfo_bodyfile_mft"]

